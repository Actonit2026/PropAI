<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reset Password — PropAI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:Arial, sans-serif; background:#f8fafc; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
.logo{ font-size:24px; font-weight:700; color:#2563eb; margin-bottom:28px; cursor:pointer; }
.box{ background:white; border:1px solid #e5e7eb; border-radius:20px; width:100%; max-width:420px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.08); padding:32px 28px; }
.box-title{ font-size:20px; font-weight:700; color:#111827; margin-bottom:6px; }
.box-sub{ font-size:14px; color:#6b7280; margin-bottom:24px; line-height:1.5; }
.field-label{ font-size:13px; font-weight:700; color:#374151; display:block; margin-bottom:6px; margin-top:16px; }
.field-label:first-of-type{ margin-top:0; }
.password-wrap{ position:relative; }
.password-wrap input{ width:100%; padding:14px; padding-right:48px; border:1.5px solid #e5e7eb; border-radius:10px; font-size:15px; outline:none; transition:border-color 0.15s; }
.password-wrap input:focus{ border-color:#2563eb; }
.toggle-pw{ position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:18px; color:#9ca3af; }
.strength-bar{ height:4px; border-radius:4px; background:#e5e7eb; margin-top:8px; overflow:hidden; }
.strength-fill{ height:100%; border-radius:4px; width:0%; transition:width 0.3s, background 0.3s; }
.strength-label{ font-size:11px; color:#9ca3af; margin-top:4px; }
.submit-btn{ width:100%; padding:14px; background:#2563eb; color:white; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; margin-top:20px; transition:0.15s; }
.submit-btn:hover{ background:#1d4ed8; }
.submit-btn:disabled{ background:#93c5fd; cursor:not-allowed; }
.error-msg{ display:none; background:#fee2e2; border:1px solid #fecaca; border-radius:8px; padding:10px 14px; font-size:13px; color:#dc2626; margin-top:12px; }
.success-state{ display:none; text-align:center; padding:12px 0; }
.success-icon{ font-size:48px; margin-bottom:16px; }
.success-title{ font-size:20px; font-weight:700; color:#111827; margin-bottom:8px; }
.success-sub{ font-size:14px; color:#6b7280; line-height:1.6; }
.invalid-state{ text-align:center; padding:12px 0; }
.invalid-icon{ font-size:48px; margin-bottom:16px; }
</style>
</head>
<body>

<div class="logo" onclick="window.location.href='/'">PropAI</div>

<div class="box">

  <!-- INVALID / EXPIRED LINK -->
  <div class="invalid-state" id="invalidState" style="display:none;">
    <div class="invalid-icon">⏱️</div>
    <div class="box-title" style="text-align:center;">Link expired</div>
    <div class="box-sub" style="text-align:center;margin-top:8px;">This reset link has expired or already been used. Request a new one from the login page.</div>
    <button class="submit-btn" onclick="window.location.href='/login.html?tab=login'">Back to log in →</button>
  </div>

  <!-- RESET FORM -->
  <div id="resetForm">
    <div class="box-title">Set a new password</div>
    <div class="box-sub">Choose something secure — at least 8 characters.</div>

    <label class="field-label">New password</label>
    <div class="password-wrap">
      <input type="password" id="newPassword" placeholder="Minimum 8 characters" oninput="checkStrength()">
      <button class="toggle-pw" onclick="togglePw('newPassword', this)">👁</button>
    </div>
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="strength-label" id="strengthLabel"></div>

    <label class="field-label">Confirm new password</label>
    <div class="password-wrap">
      <input type="password" id="confirmPassword" placeholder="Repeat your password">
      <button class="toggle-pw" onclick="togglePw('confirmPassword', this)">👁</button>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="handleReset()">Update password →</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- SUCCESS -->
  <div class="success-state" id="successState">
    <div class="success-icon">✅</div>
    <div class="success-title">Password updated</div>
    <div class="success-sub">You're all set. Taking you to your dashboard...</div>
  </div>

</div>

<script>
const sbClient = window.supabase.createClient(
  "https://xogedcqykxdzmllmptks.supabase.co",
  "sb_publishable_EQN-MT7Rd7ghL0rpSF96Dw_Z7ZAih5U",
  { auth:{ persistSession:true, autoRefreshToken:true, storageKey:"propai_session" } }
);

let sessionReady = false;

// Supabase puts the recovery token in the URL hash — onAuthStateChange handles it
sbClient.auth.onAuthStateChange(async (event, session) => {
  if(event === "PASSWORD_RECOVERY"){
    sessionReady = true;
    // Session is now active — user can set new password
  } else if(event === "SIGNED_IN" && session){
    sessionReady = true;
  }
});

// If no token in URL after 3 seconds, show invalid state
window.addEventListener("load", function(){
  const hash = window.location.hash;
  if(!hash.includes("access_token") && !hash.includes("type=recovery")){
    setTimeout(()=>{
      if(!sessionReady){
        document.getElementById("resetForm").style.display = "none";
        document.getElementById("invalidState").style.display = "block";
      }
    }, 3000);
  }
});

function togglePw(fieldId, btn){
  const el = document.getElementById(fieldId);
  if(el.type === "password"){ el.type = "text"; btn.innerText = "🙈"; }
  else { el.type = "password"; btn.innerText = "👁"; }
}

function checkStrength(){
  const pw = document.getElementById("newPassword").value;
  const fill = document.getElementById("strengthFill");
  const label = document.getElementById("strengthLabel");
  let score = 0;
  if(pw.length >= 8) score++;
  if(pw.length >= 12) score++;
  if(/[A-Z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;
  const levels = [
    { pct:"0%", color:"#e5e7eb", text:"" },
    { pct:"25%", color:"#ef4444", text:"Weak" },
    { pct:"50%", color:"#f97316", text:"Fair" },
    { pct:"75%", color:"#eab308", text:"Good" },
    { pct:"100%", color:"#22c55e", text:"Strong" },
  ];
  const level = levels[Math.min(score, 4)];
  fill.style.width = level.pct;
  fill.style.background = level.color;
  label.innerText = level.text;
  label.style.color = level.color;
}

async function handleReset(){
  const newPw = document.getElementById("newPassword").value;
  const confirm = document.getElementById("confirmPassword").value;
  const errEl = document.getElementById("errorMsg");
  errEl.style.display = "none";

  if(newPw.length < 8){
    errEl.innerText = "Password must be at least 8 characters.";
    errEl.style.display = "block";
    return;
  }
  if(newPw !== confirm){
    errEl.innerText = "Passwords don't match.";
    errEl.style.display = "block";
    return;
  }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "Updating...";

  const { error } = await sbClient.auth.updateUser({ password: newPw });

  if(error){
    errEl.innerText = error.message || "Something went wrong. Please request a new reset link.";
    errEl.style.display = "block";
    btn.disabled = false;
    btn.innerText = "Update password →";
    return;
  }

  document.getElementById("resetForm").style.display = "none";
  document.getElementById("successState").style.display = "block";
  setTimeout(()=>window.location.href="/dashboard.html", 2000);
}
</script>
</body>
</html>
